# 地图对应的栅格图像文件（PGM灰度图）
image: room.pgm
# 图像解析模式：trinary 表示只识别三种状态——占用、空闲、未知
mode: trinary
# 地图分辨率：每个像素代表现实世界 0.05 米
resolution: 0.05
# 地图原点（左下角）在世界坐标系中的坐标 [x, y, yaw]
# 单位：米、弧度
origin: [-10.4, -6.53, 0]
# 是否反转黑白意义：0 不反转（白色=空闲，黑色=占用）
negate: 0
# 占用阈值：像素值 > 0.65 视为障碍物
occupied_thresh: 0.65
# 空闲阈值：像素值 < 0.25 视为可通行区域
free_thresh: 0.25