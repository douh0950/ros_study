# AMCL 定位节点：负责机器人在地图中的定位计算
amcl:
  ros__parameters:
    use_sim_time: True  # 使用仿真时间
    alpha1: 0.2  # 里程计旋转误差参数
    alpha2: 0.2  # 里程计旋转误差参数
    alpha3: 0.2  # 里程计平移误差参数
    alpha4: 0.2  # 里程计平移误差参数
    alpha5: 0.2  # 里程计平移/旋转耦合误差参数
    base_frame_id: "base_footprint"  # 机器人基坐标系
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"  # 全局地图坐标系
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 100.0  # 激光最大测距
    laser_min_range: -1.0   # 激光最小测距
    laser_model_type: "likelihood_field"  # 激光模型类型
    max_beams: 60  # 参与定位的激光束数量
    max_particles: 2000  # 最大粒子数
    min_particles: 500   # 最小粒子数
    odom_frame_id: "odom"  # 里程计坐标系
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1  # 重采样间隔
    robot_model_type: "nav2_amcl::DifferentialMotionModel"  # 差分运动模型
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true  # 发布坐标变换
    transform_tolerance: 1.0  # 坐标变换容忍值
    update_min_a: 0.2   # 角度更新阈值
    update_min_d: 0.25  # 距离更新阈值
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan  # 激光雷达话题

# 行为树导航器：执行导航任务的核心节点
